on:
  push:
    branches:
      - newmain

permissions:
  contents: write
  pull-requests: write

name: release-please-alpha

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate dynamic release config
        run: |
          echo "{
            \"packages\": {
              \".\": {
                \"changelog-path\": \"CHANGELOG.md\",
                \"release-type\": \"node\",
                \"draft\": false,
                \"prerelease\": true,
                \"prerelease-type\": \"alpha\",
                \"include-v-in-tag\": true,
                \"default-branch\": \"newmain\",
                \"release-as\": \"2.0.0-alpha.${{ github.run_number }}\",
                \"changelog-sections\": [
                  {\"type\": \"feat\", \"section\": \"Features\", \"hidden\": false},
                  {\"type\": \"fix\", \"section\": \"Bug Fixes\", \"hidden\": false},
                  {\"type\": \"breaking\", \"section\": \"Breaking Changes\", \"hidden\": false}
                ],
                \"last-release-sha\": \"71c9a0823ee3dec3eabf0ab42bf3141287bf34a2\",
                \"extra-files\": [
                  \"package.json\",
                  \"package-lock.json\"
                ]
              }
            },
            \"bootstrap-sha\": \"71c9a0823ee3dec3eabf0ab42bf3141287bf34a2\",
            \"release-search-depth\": 100,
            \"pull-request-header\": \"Automated Release PR\",
            \"pull-request-title-pattern\": \"chore\${scope}: release\${component} \${version}\",
            \"$schema\": \"https://raw.githubusercontent.com/googleapis/release-please/main/schemas/config.json\"
          }" > release-please-config.json

      - name: Run release-please-action
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          target-branch: newmain